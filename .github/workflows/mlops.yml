name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'tests/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          rm -rf mlruns
          pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_EXPERIMENT_NAME: day21

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "New model accuracy: $ACC"

      - name: Compare with previous deployed model
        run: |
          python - <<'EOF'
          import json
          import os
          import boto3
          from botocore.exceptions import ClientError

          bucket = os.environ["CLOUD_BUCKET"]
          new_metrics = json.load(open("outputs/metrics.json", encoding="utf-8"))
          new_acc = float(new_metrics["accuracy"])
          old_acc = 0.0

          s3 = boto3.client("s3")
          try:
              s3.download_file(bucket, "metrics/latest/metrics.json", "old_metrics.json")
              old_metrics = json.load(open("old_metrics.json", encoding="utf-8"))
              old_acc = float(old_metrics.get("accuracy", 0.0))
              print(f"Previous deployed accuracy: {old_acc:.4f}")
          except ClientError:
              print("No previous metrics found. First deploy is allowed.")

          print(f"New candidate accuracy: {new_acc:.4f}")
          if new_acc < old_acc:
              raise SystemExit(
                  f"FAILED: new accuracy {new_acc:.4f} < previous accuracy {old_acc:.4f}. Cancel deploy."
              )
          print("PASSED: new model is at least as accurate as the deployed model.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Upload model and reports to S3
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          uploads = {
              "models/model.pkl": "models/latest/model.pkl",
              "outputs/metrics.json": "metrics/latest/metrics.json",
              "outputs/report.txt": "metrics/latest/report.txt",
          }

          s3 = boto3.client("s3")
          for local_path, object_key in uploads.items():
              s3.upload_file(local_path, bucket, object_key)
              print(f"Uploaded {local_path} to s3://{bucket}/{object_key}")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-report
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          new_acc = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          if new_acc < threshold:
              raise SystemExit(f"FAILED: accuracy {new_acc:.4f} < {threshold:.2f}. Cancel deploy.")
          print(f"PASSED: accuracy {new_acc:.4f} >= {threshold:.2f}.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy API file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}"

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
